version: 1.4.7+20

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_generative_ai: ^0.4.6
  http: ^1.2.0
  image_picker: ^1.1.2
